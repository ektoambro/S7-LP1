<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spin The Wheel</title>

    <link rel="icon" type="image/x-icon" href="static/pictures/win.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet"/>

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            <img src="static/pictures/spades.png" width="45" height="45">
        </a>

        <div class="navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/about">About</a>
                </li>
            </ul>

            <ul class="nav navbar-nav navbar-right">
                <li class="nav-item">
                    <a class="nav-link" href="/login">
                        <img src="static/pictures/profil.png" width="35" height="35">
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- WHEEL SECTION -->
<div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" width="500" height="500"></canvas>
    <!-- Add this centered icon -->
    <div class="wheel-center-icon">
        <img src="static/pictures/spades.png" alt="Wheel Center">
    </div>
    <button id="spinBtn">SPIN</button>
</div>

<!-- MODAL -->
<div id="resultModal" class="modal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-body text-center p-4">
        <div class="result-icon">💸</div>
        <h4 class="result-title mt-3">Congratulations!</h4>
        <p class="result-text" id="resultText"></p>
        <button type="button" class="btn btn-close-modal mt-3" data-bs-dismiss="modal">Continue</button>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='wheel.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script src="{{ url_for('static', filename='wheel.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
