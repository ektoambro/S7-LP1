<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Successful - Gambling.org</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container text-center mt-5">
        <div class="login-card mx-auto" style="max-width: 500px;">
            <div class="confirmation-icon-wrapper">
                <span class="confirmation-icon">✓</span>
            </div>
            <h2 class="text-white">Welcome, {{ user.first_name }}!</h2>
            <p class="text-light">You are now logged in.</p>
            <div class="mt-4">
                <a href="{{ url_for('home') }}" class="hero-cta-btn me-2">Home</a>
                <a href="{{ url_for('wheelspin') }}" class="play-btn">Play Wheel</a>
            </div>
            <p class="mt-4 text-warning">Keep Playing!</p>
        </div>
    </div>
    {% include 'footer.html' %}
</body>
</html>
