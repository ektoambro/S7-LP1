<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slots - Gambling.org</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='pictures/win.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}

    <div class="slots-wrapper">
        <div class="slot-machine">
            <h2 class="slot-title">🎰 SLOT MACHINE</h2>
            
            <div class="reels">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍒</div>
                <div class="reel" id="reel3">🍒</div>
            </div>

            <div class="controls">
                <div class="bet-selector">
                    <span>Mise :</span>
                    <span id="betDisplay">10€</span>
                    <div class="bet-buttons">
                        <button class="bet-btn" data-bet="5">5€</button>
                        <button class="bet-btn active" data-bet="10">10€</button>
                        <button class="bet-btn" data-bet="20">20€</button>
                        <button class="bet-btn" data-bet="50">50€</button>
                    </div>
                </div>
                
                <button class="spin-button" id="spinButton">SPIN</button>
                
                <div class="result" id="result"></div>
            </div>

            <div class="payouts">
                <div><span>🍒🍒🍒</span> x5</div>
                <div><span>🍋🍋🍋</span> x10</div>
                <div><span>🍊🍊🍊</span> x15</div>
                <div><span>💎💎💎</span> x25</div>
                <div><span>7️⃣7️⃣7️⃣</span> x100</div>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="{{ url_for('static', filename='slots.js') }}"></script>
</body>
</html>
